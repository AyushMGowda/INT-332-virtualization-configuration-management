jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: projects/docker-ci-cd-app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt
